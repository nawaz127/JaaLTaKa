name: jaaltaka_app
description: "JaalTaka - Bangladeshi Banknote Authentication by Shah Nawaz"

publish_to: "none"

version: 1.1.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.12.0
  onnxruntime: ^1.3.4
  image: ^4.1.4
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  provider: ^6.1.1
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.1
  image_picker: ^1.0.7
  share_plus: ^7.2.2
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  vibration: ^2.0.0
  screenshot: ^3.0.0
  pdf: ^3.10.8
  printing: ^5.11.1
  http: ^1.2.0
  flutter_tts: ^3.8.5
  google_mlkit_text_recognition: ^0.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1A73E8"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
